name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m py_compile payment_qpay/__init__.py
      - run: python -m py_compile payment_qpay/__manifest__.py
      - run: find payment_qpay/ -name "*.py" -exec python -m py_compile {} \;
